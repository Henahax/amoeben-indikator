version: '2.1'
services:
  nginx:
    image: henahax/amoeben-indikator:latest
    container_name: amoeben-indikator
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - DATABASE_URL=postgres://postgres:postgres@localhost:5432/test_db
    entrypoint: ["sh", "-c", "until pg_isready -h db -p 5432; do sleep 1; done; npm run dev"]
    ports:
      - 8083:4321
    restart: unless-stopped
    